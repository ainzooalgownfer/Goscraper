global
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    timeout connect 15s
    timeout client  45s
    timeout server  45s

resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries       5
    timeout retry         1s
    hold valid           10s

frontend http_proxy_in
    bind *:8888
    mode tcp
    default_backend tor_backend

backend tor_backend
    mode tcp
    balance roundrobin

    # Blindly forward traffic using Docker's internal container load discovery mapping
    default-server resolvers docker_dns init-addr none

    server tor-node-1 tor-node:8118
