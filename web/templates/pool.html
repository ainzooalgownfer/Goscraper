{{define "title"}}Proxy Pool{{end}}

{{define "content"}}
<div class="flex items-center justify-between mb-24">
    <h1 class="page-title" style="margin-bottom:0">Proxy Pool</h1>
    <div class="flex gap-8">
        <button class="btn btn-warning btn-sm"
                hx-post="/ui/actions/pool-rotate"
                hx-target="#rotate-result"
                hx-swap="innerHTML"> Rotate Circuits</button>
        <button class="btn btn-ghost btn-sm"
                hx-post="/ui/actions/pool-reset"
                hx-target="#pool-nodes"
                hx-swap="innerHTML">♻ Reset Pool</button>
    </div>
</div>

<div id="rotate-result" class="mb-16"></div>

<div class="grid grid-2">
    <div class="card">
        <div class="card-title">Node Status</div>
        <div id="pool-nodes"
             hx-get="/ui/partials/pool-nodes"
             hx-trigger="load, every 5s">Loading...</div>
    </div>
    <div class="card">
        <div class="card-title">Pool Summary</div>
        <div id="pool-summary"
             hx-get="/ui/partials/pool-summary"
             hx-trigger="load, every 5s">Loading...</div>
    </div>
</div>
{{end}}
