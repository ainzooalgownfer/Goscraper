definitions:
  api.ScrapeRequest:
    description: Scrape request body
    properties:
      selectors:
        additionalProperties:
          type: string
        type: object
      strategy:
        type: string
      url:
        type: string
    required:
    - url
    type: object
info:
  contact: {}
paths:
  /jobs/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves the details of a specific scrape job.
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a scrape job
      tags:
      - jobs
  /scrape:
    post:
      consumes:
      - application/json
      description: Submits a URL to the worker pool for scraping. Supports multiple
        extraction strategies.
      parameters:
      - description: Scrape request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ScrapeRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Submit a scrape job
      tags:
      - jobs
swagger: "2.0"
